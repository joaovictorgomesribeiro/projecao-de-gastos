<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Gastos</title>
    <style>
        /* Variáveis de Cores Baseadas na Paleta Fornecida */
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --success: #22c55e;
            --error: #ef4444;
        }

        /* Reset Básico */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Para scroll natural no mobile */
            min-height: 100vh;
            padding: 24px 16px; /* Padding geral para desgrudar da tela */
        }

        /* Container Principal */
        .container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* Cabeçalho */
        header {
            text-align: center;
        }

        header h1 {
            font-size: 24px;
            font-weight: 600;
        }

        /* Card do formulário */
        .card {
            background-color: var(--card-bg);
            border-radius: 16px; /* Bordas arredondadas e modernas */
            padding: 24px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border-color);
        }

        /* Formulário e Grupos de Input */
        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-color);
        }

        /* Inputs e target táctil */
        input, select {
            width: 100%;
            min-height: 48px; /* Touch target superior a 44px */
            padding: 12px 16px;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-color);
            font-size: 16px; /* 16px para evitar auto-zoom no iOS */
            outline: none;
            transition: all 0.2s ease;
        }

        input::placeholder {
            color: var(--text-muted);
        }

        /* Focus visual state */
        input:focus, select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.25);
        }

        /* Botão de Envio Destacado */
        .btn-submit {
            background-color: var(--primary);
            color: var(--text-color);
            border: none;
            border-radius: 10px;
            min-height: 54px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
            margin-top: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Hover e Active no desktop e mobile */
        .btn-submit:hover {
            background-color: var(--primary-hover);
        }

        .btn-submit:active {
            transform: scale(0.97);
        }

        /* Feedback de mensagem */
        .feedback {
            display: none;
            padding: 16px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            animation: slideDown 0.3s ease;
        }

        .feedback.success {
            display: block;
            background-color: rgba(34, 197, 94, 0.1);
            color: var(--success);
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        .feedback.error {
            display: block;
            background-color: rgba(239, 68, 68, 0.1);
            color: var(--error);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        /* Animação suave para exibir mensagem */
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Apenas um ajuste visual para as opções do select nos navegadores que suportam */
        option {
            background-color: var(--card-bg);
            color: var(--text-color);
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Cadastro de Gastos</h1>
        </header>

        <!-- Container para as mensagens de feedback -->
        <div id="feedbackMessage" class="feedback"></div>

        <div class="card">
            <form id="cadastroForm">
                
                <div class="input-group">
                    <label for="descricao">Descrição *</label>
                    <input type="text" id="descricao" name="descricao" placeholder="Ex: Supermercado, Aluguel" required>
                </div>

                <div class="input-group">
                    <label for="valor">Valor (R$) *</label>
                    <input type="number" id="valor" name="valor" step="0.01" min="0" placeholder="0.00" required>
                </div>

                <div class="input-group">
                    <label for="classificacao">Classificação *</label>
                    <select id="classificacao" name="classificacao" required>
                        <option value="" disabled selected>Selecione...</option>
                        <option value="saida">Saída (Despesa)</option>
                        <option value="entrada">Entrada (Receita)</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="tipo">Tipo / Categoria</label>
                    <input type="text" id="tipo" name="tipo" placeholder="Ex: Alimentação, Moradia">
                </div>

                <div class="input-group">
                    <label for="instituicao">Instituição *</label>
                    <select id="instituicao" name="instituicao" required>
                        <option value="" disabled selected>Selecione uma instituição</option>
                        <option value="Nubank">Nubank</option>
                        <option value="Inter">Inter</option>
                        <option value="Santander">Santander</option>
                        <option value="Banco do Brasil">Banco do Brasil</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="forma_pagamento">Forma de Pagamento *</label>
                    <select id="forma_pagamento" name="forma_pagamento" required>
                        <option value="" disabled selected>Selecione a forma de pagamento</option>
                        <option value="Crédito">Crédito</option>
                        <option value="Débito">Débito</option>
                        <option value="Pix">Pix</option>
                        <option value="Boleto">Boleto</option>
                        <option value="Espécie">Espécie</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="parcela">Parcela</label>
                    <input type="text" id="parcela" name="parcela" placeholder="Ex: 1/12 (se parcelado)">
                </div>

                <button type="submit" class="btn-submit" id="submitBtn">Salvar</button>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('cadastroForm');
            const feedbackMessage = document.getElementById('feedbackMessage');
            const submitBtn = document.getElementById('submitBtn');

            form.addEventListener('submit', async function(e) {
                // 1. Prevenir reload da página
                e.preventDefault(); 

                // Feedback visual de carregamento no botão
                const btnOriginalText = submitBtn.innerText;
                submitBtn.innerText = "Salvando...";
                submitBtn.disabled = true;
                submitBtn.style.opacity = '0.7';

                // Limpar feedback anterior
                esconderFeedback();

                // 2. Coletar dados via FormData
                const formData = new FormData(form);

                try {
                    // 3. Enviar dados via fetch
                    const response = await fetch('http://localhost/projecao-gastos/api/salvar.php', {
                        method: 'POST',
                        body: formData
                    });

                    // 4. Trabalhar com a resposta
                    if (response.ok) {
                        mostrarFeedback('Gasto salvo com sucesso!', 'success');
                        form.reset(); // Feedback visual: Limpar formulário
                    } else {
                        mostrarFeedback('Erro ao salvar o gasto', 'error');
                    }
                } catch (error) {
                    // Trata problemas de rede
                    console.error('Falha na requisição Fetch:', error);
                    mostrarFeedback('Erro ao salvar o gasto', 'error');
                } finally {
                    // Retornar o botão ao estado natural
                    submitBtn.innerText = btnOriginalText;
                    submitBtn.disabled = false;
                    submitBtn.style.opacity = '1';
                    
                    // Rolar pro topo de maneira suave no mobile caso não consiga ver o alerta
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            });

            // Funções auxiliares para feedback
            function mostrarFeedback(texto, tipo) {
                feedbackMessage.innerText = texto;
                feedbackMessage.className = `feedback ${tipo}`;
                
                // Ocultar automaticamente após 4 segundos em caso de sucesso
                if (tipo === 'success') {
                    setTimeout(() => {
                        esconderFeedback();
                    }, 4000);
                }
            }

            function esconderFeedback() {
                feedbackMessage.className = 'feedback';
                feedbackMessage.innerText = '';
            }
        });
    </script>
</body>
</html>
